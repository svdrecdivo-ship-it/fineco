<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nam Terminal Dense</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#05070d;
  --panel:#0f172a;
  --border:#1e293b;
  --text:#e5e7eb;
  --green:#22c55e;
  --red:#ef4444;
}

body{margin:0;font-family:Inter;background:var(--bg);color:var(--text)}

header{padding:12px;text-align:center;background:#020617;font-size:18px}

.ticker{background:#000;color:#22c55e;padding:6px;font-size:14px}

.container{
  display:grid;
  grid-template-columns:1.5fr 1fr;
  gap:8px;
  padding:8px;
  height:calc(100vh - 70px);
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:8px;
  padding:8px;
  display:flex;
  flex-direction:column;
}

.title{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}

.market-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
}

.card{
  background:#020617;
  padding:6px;
  border-radius:6px;
  text-align:center;
}

.symbol{font-size:11px;color:#9ca3af}
.price{font-size:14px;font-weight:600}
.change{font-size:11px}

.green{color:var(--green)}
.red{color:var(--red)}

.big{
  font-size:20px;
  font-weight:700;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.small-box{
  background:#020617;
  padding:6px;
  border-radius:6px;
  font-size:12px;
}

.heatmap{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
}

.box{padding:8px;border-radius:4px;font-size:11px;text-align:center}

canvas{flex:1}

footer{display:none}
</style>
</head>

<body>

<header>📊 NAM TERMINAL DENSE</header>
<div class="ticker" id="ticker">Loading...</div>

<div class="container">

<div class="panel">
<div class="title">VN MARKET</div>
<div class="market-grid" id="market"></div>

<div class="title">VNINDEX</div>
<div class="big" id="vnindex">--</div>
<canvas id="chart"></canvas>
</div>

<div class="panel">
<div class="title">GLOBAL</div>
<div class="grid2" id="global"></div>

<div class="title">HEATMAP</div>
<div class="heatmap" id="heatmap"></div>
</div>

</div>

<script>
const symbols=["VCB","BID","CTG","HPG","FPT","MWG","GAS","SSI","VNM","TPB","MBB","ACB"];

let chartData=[];
let labels=[];

const ctx=document.getElementById('chart').getContext('2d');

const chart=new Chart(ctx,{
  type:'line',
  data:{labels:labels,datasets:[{data:chartData,borderColor:'#3b82f6',pointRadius:0}]},
  options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false}}}
});

async function loadVN(){
  try{
    const url="https://api.allorigins.win/raw?url=https://priceboard.vcbs.com.vn/api/price?codes="+symbols.join(",");
    const res=await fetch(url);
    const data=await res.json();

    let html="";
    data.forEach(s=>{
      let p=s.matchPrice||0;
      let c=s.change||0;
      html+=`<div class="card">
        <div class="symbol">${s.symbol}</div>
        <div class="price">${p}</div>
        <div class="change ${c>=0?'green':'red'}">${c}</div>
      </div>`;
    });

    document.getElementById("market").innerHTML=html;

    let vn=1200+Math.random()*10;
    document.getElementById("vnindex").innerText=vn.toFixed(1);

    chartData.push(vn);
    labels.push("");
    if(chartData.length>30){chartData.shift();labels.shift();}
    chart.update();

  }catch{}
}

async function loadGlobal(){
  const res=await fetch('https://api.exchangerate.host/latest?base=USD&symbols=VND,EUR');
  const d=await res.json();

  let gold=2300+Math.random()*10;
  let oil=85+Math.random()*5;

  document.getElementById("global").innerHTML=`
    <div class="small-box">USD ${d.rates.VND.toFixed(0)}</div>
    <div class="small-box">EUR ${(1/d.rates.EUR).toFixed(2)}</div>
    <div class="small-box">GOLD ${gold.toFixed(0)}</div>
    <div class="small-box">OIL ${oil.toFixed(0)}</div>
  `;

  document.getElementById("ticker").innerText=`USD ${d.rates.VND.toFixed(0)} | GOLD ${gold.toFixed(0)} | OIL ${oil.toFixed(0)}`;
}

function loadHeatmap(){
  const sectors=["Bank","Oil","Steel","Tech","Retail","Export"];
  let html="";

  sectors.forEach(s=>{
    let v=Math.random();
    let g=Math.floor(255*v);
    let r=255-g;
    html+=`<div class="box" style="background:rgb(${r},${g},80)">${s}</div>`;
  });

  document.getElementById("heatmap").innerHTML=html;
}

function run(){
  loadVN();
  loadGlobal();
  loadHeatmap();
}

run();
setInterval(run,8000);

</script>

</body>
</html>
