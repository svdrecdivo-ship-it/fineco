<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nam Financial Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f4f6fb;
  --panel:#ffffff;
  --border:#e5e7eb;
  --text:#111827;
  --green:#16a34a;
  --red:#dc2626;
}

body{
  margin:0;
  font-family:Inter;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:18px;
  text-align:center;
  font-size:26px;
  font-weight:700;
  background:#ffffff;
  border-bottom:1px solid var(--border);
}

.ticker{
  background:#111827;
  color:#22c55e;
  padding:10px;
  font-size:15px;
}

.container{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
  padding:12px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
}

.title{
  font-size:16px;
  font-weight:600;
  margin-bottom:10px;
  border-bottom:1px solid var(--border);
  padding-bottom:6px;
}

.market-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:#f9fafb;
  padding:10px;
  border-radius:8px;
  text-align:center;
}

.symbol{font-size:14px;color:#6b7280}
.price{font-size:22px;font-weight:600}
.change{font-size:14px}

.green{color:var(--green)}
.red{color:var(--red)}

.big{
  font-size:32px;
  font-weight:700;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#f9fafb;
  padding:10px;
  border-radius:8px;
  font-size:14px;
}

.heatmap{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.heat{
  padding:12px;
  border-radius:6px;
  text-align:center;
  font-size:14px;
  font-weight:600;
}

canvas{
  margin-top:10px;
}

footer{
  text-align:center;
  padding:15px;
  background:#ffffff;
  border-top:1px solid var(--border);
  margin-top:10px;
}

</style>
</head>

<body>

<header>📊 HỆ THỐNG TÀI CHÍNH VIỆT NAM</header>

<div class="ticker" id="ticker">Đang tải dữ liệu...</div>

<div class="container">

<!-- LEFT -->
<div class="panel">
<div class="title">📈 THỊ TRƯỜNG VIỆT NAM</div>
<div class="market-grid" id="market"></div>

<div class="title">📊 VN-INDEX</div>
<div class="big" id="vnindex">--</div>
<canvas id="chart" height="100"></canvas>
</div>

<!-- RIGHT -->
<div class="panel">
<div class="title">🌍 CHỈ SỐ VĨ MÔ</div>
<div class="grid2" id="global"></div>

<div class="title">🔥 NGÀNH</div>
<div class="heatmap" id="heatmap"></div>
</div>

</div>

<footer>
Design by Nam ko Hề
</footer>

<script>
const symbols=["VCB","BID","CTG","HPG","FPT","MWG","GAS","SSI","VNM"];

let chartData=[];
let labels=[];

const ctx=document.getElementById('chart').getContext('2d');

const chart=new Chart(ctx,{
  type:'line',
  data:{labels:labels,datasets:[{data:chartData,borderColor:'#2563eb'}]},
  options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:true}}}
});

async function loadVN(){
  try{
    const url="https://api.allorigins.win/raw?url=https://priceboard.vcbs.com.vn/api/price?codes="+symbols.join(",");
    const res=await fetch(url);
    const data=await res.json();

    let html="";
    data.forEach(s=>{
      let p=s.matchPrice||0;
      let c=s.change||0;

      html+=`<div class="card">
        <div class="symbol">${s.symbol}</div>
        <div class="price">${p}</div>
        <div class="change ${c>=0?'green':'red'}">${c}</div>
      </div>`;
    });

    document.getElementById("market").innerHTML=html;

    let vn=1200+Math.random()*10;
    document.getElementById("vnindex").innerText=vn.toFixed(2);

    chartData.push(vn);
    labels.push("");
    if(chartData.length>20){chartData.shift();labels.shift();}
    chart.update();

  }catch(e){}
}

async function loadGlobal(){
  const res=await fetch('https://api.exchangerate.host/latest?base=USD&symbols=VND,EUR');
  const d=await res.json();

  let gold=2300+Math.random()*20;
  let oil=85+Math.random()*5;

  document.getElementById("global").innerHTML=`
    <div class="box">USD/VND: <b>${d.rates.VND.toFixed(0)}</b></div>
    <div class="box">EUR/USD: <b>${(1/d.rates.EUR).toFixed(2)}</b></div>
    <div class="box">Vàng: <b>${gold.toFixed(0)}</b></div>
    <div class="box">Dầu: <b>${oil.toFixed(0)}</b></div>
  `;

  document.getElementById("ticker").innerText=`USD/VND ${d.rates.VND.toFixed(0)} | Vàng ${gold.toFixed(0)} | Dầu ${oil.toFixed(0)}`;
}

function loadHeatmap(){
  const sectors=["Ngân hàng","Dầu khí","Thép","Công nghệ","Bán lẻ","Xuất khẩu"];

  let html="";
  sectors.forEach(s=>{
    let val=Math.random();
    let color=val>0.5?"#16a34a":"#dc2626";
    html+=`<div class="heat" style="background:${color};color:white">${s}</div>`;
  });

  document.getElementById("heatmap").innerHTML=html;
}

function run(){
  loadVN();
  loadGlobal();
  loadHeatmap();
}

run();
setInterval(run,8000);

</script>

</body>
</html>
