<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VN Financial Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      background: #0a0f1c;
      color: white;
    }

    header {
      padding: 18px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: #020617;
      border-bottom: 2px solid #1e293b;
    }

    .ticker {
      background: #111827;
      overflow: hidden;
      white-space: nowrap;
    }

    .ticker span {
      display: inline-block;
      padding: 10px;
      animation: scroll 18s linear infinite;
      font-size: 16px;
    }

    @keyframes scroll {
      from { transform: translateX(100%); }
      to { transform: translateX(-100%); }
    }

    .container {
      padding: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .symbol {
      font-weight: bold;
      font-size: 18px;
    }

    .price {
      font-size: 22px;
      margin-top: 5px;
    }

    .change {
      font-size: 16px;
      margin-top: 5px;
    }

    .up { color: #22c55e; }
    .down { color: #ef4444; }

    canvas {
      margin-top: 15px;
      background: #020617;
      border-radius: 10px;
      padding: 10px;
    }

    footer {
      margin-top: 10px;
      padding: 15px;
      text-align: center;
      background: #020617;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  HỆ THỐNG CẬP NHẬT TÀI CHÍNH VIỆT NAM
</header>

<div class="ticker">
  <span>
    🔥 Tin nóng: VN-Index biến động | Dòng tiền quay lại nhóm ngân hàng | Khối ngoại mua ròng | Thị trường chờ tín hiệu từ FED
  </span>
</div>

<div class="container">
  <div class="grid" id="market"></div>
  <canvas id="chart" height="100"></canvas>
</div>

<footer>
  Design bởi Nam Tran | Email: svdrecdivo@gmail.com
</footer>

<script>
const symbols = ["^VNINDEX","VCB.VN","VNM.VN","HPG.VN","FPT.VN"];

let chartData = [];
let labels = [];

const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'VN-Index',
      data: chartData,
      borderColor: "#3b82f6",
      tension: 0.3
    }]
  },
  options: {
    plugins: { legend: { labels: { color: "white" } } },
    scales: {
      x: { ticks: { color: "white" } },
      y: { ticks: { color: "white" } }
    }
  }
});

async function fetchData() {
  try {
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(",")}`;
    const res = await fetch(url);
    const data = await res.json();

    const container = document.getElementById("market");
    container.innerHTML = "";

    data.quoteResponse.result.forEach(item => {
      const price = item.regularMarketPrice;
      const change = item.regularMarketChangePercent;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="symbol">${item.symbol}</div>
        <div class="price">${price}</div>
        <div class="change ${change >= 0 ? 'up' : 'down'}">
          ${change ? change.toFixed(2) : 0}%
        </div>
      `;

      container.appendChild(div);

      if (item.symbol === "^VNINDEX") {
        chartData.push(price);
        labels.push(new Date().toLocaleTimeString());

        if (chartData.length > 20) {
          chartData.shift();
          labels.shift();
        }
      }
    });

    chart.update();

  } catch (err) {
    console.log("API lỗi:", err);
  }
}

fetchData();
setInterval(fetchData, 10000);
</script>

</body>
</html>
