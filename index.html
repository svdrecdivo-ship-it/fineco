<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nam Terminal Ultra</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#05070d;
  --panel:#0f172a;
  --border:#1e293b;
  --text:#e5e7eb;
  --green:#22c55e;
  --red:#ef4444;
}

body{margin:0;font-family:Inter;background:var(--bg);color:var(--text)}

header{
  padding:18px;
  text-align:center;
  font-size:22px;
  font-weight:700;
  background:#020617;
  border-bottom:1px solid var(--border);
}

.ticker{
  background:#000;
  color:#22c55e;
  padding:10px;
  font-size:15px;
}

.container{
  display:grid;
  grid-template-columns:2.5fr 1fr;
  gap:12px;
  padding:12px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
}

.title{
  font-size:16px;
  font-weight:600;
  margin-bottom:10px;
  border-bottom:1px solid var(--border);
  padding-bottom:6px;
}

.market-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  background:#020617;
  padding:12px;
  border-radius:8px;
  text-align:center;
}

.symbol{font-size:14px;color:#9ca3af}
.price{font-size:20px;font-weight:600}
.change{font-size:14px}

.green{color:var(--green)}
.red{color:var(--red)}

.big-number{
  font-size:28px;
  font-weight:700;
}

.info-box{
  background:#020617;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

.heatmap{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}

.box{
  padding:12px;
  border-radius:6px;
  text-align:center;
  font-size:14px;
}

canvas{margin-top:10px}

footer{text-align:center;padding:10px;background:#000}

</style>
</head>

<body>

<header>📊 NAM TERMINAL ULTRA</header>

<div class="ticker" id="ticker">Loading...</div>

<div class="container">

<!-- LEFT -->
<div class="panel">
<div class="title">📈 VN MARKET SNAPSHOT</div>
<div class="market-grid" id="market"></div>

<div class="title">📊 VNINDEX LIVE</div>
<div class="big-number" id="vnindex">--</div>
<canvas id="chart" height="100"></canvas>
</div>

<!-- RIGHT -->
<div class="panel">
<div class="title">🌍 GLOBAL</div>
<div class="info-box" id="global"></div>

<div class="title">🔥 HEATMAP</div>
<div class="heatmap" id="heatmap"></div>
</div>

</div>

<footer>Trang web được thiết kế bởi Nam ko Hề</footer>

<script>
const symbols=["VCB","BID","CTG","HPG","FPT","MWG","GAS","SSI","VNM","TPB","MBB","ACB"];

let chartData=[];
let labels=[];

const ctx=document.getElementById('chart').getContext('2d');

const chart=new Chart(ctx,{
  type:'line',
  data:{labels:labels,datasets:[{label:'VNINDEX',data:chartData,borderColor:'#3b82f6'}]},
  options:{plugins:{legend:{labels:{color:'white'}}},scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}
});

async function loadVN(){
  try{
    const url="https://api.allorigins.win/raw?url=https://priceboard.vcbs.com.vn/api/price?codes="+symbols.join(",");
    const res=await fetch(url);
    const data=await res.json();

    let html="";

    data.forEach(s=>{
      let price=s.matchPrice||0;
      let change=s.change||0;

      html+=`<div class="card">
        <div class="symbol">${s.symbol}</div>
        <div class="price">${price}</div>
        <div class="change ${change>=0?'green':'red'}">${change}</div>
      </div>`;
    });

    document.getElementById("market").innerHTML=html;

    let vn=1200+Math.random()*20;
    document.getElementById("vnindex").innerText=vn.toFixed(2);

    chartData.push(vn);
    labels.push(new Date().toLocaleTimeString());

    if(chartData.length>25){chartData.shift();labels.shift();}
    chart.update();

  }catch(e){}
}

async function loadGlobal(){
  const res=await fetch('https://api.exchangerate.host/latest?base=USD&symbols=VND,EUR');
  const d=await res.json();

  let gold=2300+Math.random()*20;
  let oil=85+Math.random()*5;

  document.getElementById("global").innerHTML=`
    <div>USD/VND: <b>${d.rates.VND.toFixed(0)}</b></div>
    <div>EUR/USD: <b>${(1/d.rates.EUR).toFixed(2)}</b></div>
    <div>GOLD: <b>${gold.toFixed(0)}</b></div>
    <div>OIL: <b>${oil.toFixed(0)}</b></div>
  `;

  document.getElementById("ticker").innerText=`USD ${d.rates.VND.toFixed(0)} | GOLD ${gold.toFixed(0)} | OIL ${oil.toFixed(0)}`;
}

function loadHeatmap(){
  const sectors=["Bank","Oil","Steel","Tech","Retail","Export"];
  let html="";

  sectors.forEach(s=>{
    let val=Math.random();
    let g=Math.floor(255*val);
    let r=255-g;
    html+=`<div class="box" style="background:rgb(${r},${g},80)">${s}</div>`;
  });

  document.getElementById("heatmap").innerHTML=html;
}

function run(){
  loadVN();
  loadGlobal();
  loadHeatmap();
}

run();
setInterval(run,8000);

</script>

</body>
</html>
